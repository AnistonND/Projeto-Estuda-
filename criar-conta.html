<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estuda+ | Criar Conta</title>
    <link rel="stylesheet" href="css/estilo-estudamais.css">
</head>
<body>

<header>
    <h1>Estuda+</h1>
</header>

<main class="container">
    <h2>Criar Conta</h2>

    <form id="formCadastro">
        <label>Nome:</label>
        <input type="text" id="nome" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Senha:</label>
        <input type="password" id="senha" required>

        <label>Confirmar Senha:</label>
        <input type="password" id="confirmarSenha" required>

        <button type="submit">Cadastrar</button>
    </form>

    <p>Já tem conta? <a href="portal.html">Fazer login</a></p>
</main>

<script src="js/criar-conta.js"></script>
</body>
</html>
